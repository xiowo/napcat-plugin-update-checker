name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v$(date +'%Y%m%d%H%M%S')"
          fi
          CLEAN_VERSION=$(echo $VERSION | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          npm version ${{ steps.version.outputs.clean_version }} --no-git-tag-version --allow-same-version

      - name: Install WebUI dependencies
        run: cd src/webui && pnpm install

      - name: Build project
        run: pnpm run build

      - name: Prepare release package
        env:
          PLUGIN_NAME: napcat-plugin-update-checker
        run: |
          # 创建临时目录用于组织文件
          mkdir -p release

          # 复制需要的文件到临时目录
          cp dist/index.mjs release/
          cp dist/package.json release/
          cp dist/icon.png release/
          cp -r dist/webui release/
          cp -r dist/resources release/

          # 进入临时目录并压缩
          cd release
          zip -r ../${PLUGIN_NAME}.zip index.mjs package.json icon.png webui resources

      - name: Verify zip contents
        run: |
          PLUGIN_NAME="napcat-plugin-update-checker"
          unzip -l ${PLUGIN_NAME}.zip

      - name: Collect git log
        id: gitlog
        run: |
          CURRENT_TAG="${{ steps.version.outputs.version }}"

          # 获取上一个 tag
          git fetch --tags --force
          PREV_TAG=$(git tag -l "v*" --sort=version:refname | grep -v "$CURRENT_TAG" | tail -1)

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
          fi

          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: $PREV_TAG"

          COMMITS=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG"..HEAD 2>/dev/null || git log --pretty=format:'- %s (%h)' -10)

          # 写入文件供后续步骤使用
          echo "$COMMITS" > commits.txt

          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      # （可选）AI 生成 Release Note
      # 如需启用，请在仓库 Settings > Secrets and variables > Actions > Repository secrets 中配置：
      #   AI_API_URL: 兼容 OpenAI 格式的 API 地址（如 https://api.openai.com/v1/chat/completions）
      #   AI_API_KEY: 对应的 API 密钥
      #   AI_MODEL:  （可选）模型名称，默认 gpt-4o-mini
      - name: Check AI config
        id: ai_check
        run: |
          if [ -n "$AI_API_KEY" ] && [ -n "$AI_API_URL" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ 检测到 AI 配置，将使用 AI 生成 Release Note"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 未配置 AI_API_KEY / AI_API_URL，将使用默认 Release Note"
          fi
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}

      - name: AI Generate Release Note
        id: ai_release
        if: steps.ai_check.outputs.available == 'true'
        continue-on-error: true
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          CURRENT_TAG="${{ steps.gitlog.outputs.current_tag }}"
          PREV_TAG="${{ steps.gitlog.outputs.prev_tag }}"
          COMMITS=$(cat commits.txt)
          MODEL="${AI_MODEL:-gpt-4o-mini}"

          echo "🤖 使用 AI 生成 Release Note (model: $MODEL)"

          # 获取文件变更统计和代码 diff
          SUMMARY_LINE=$(git diff --stat "$PREV_TAG"..HEAD | tail -1 || echo "No changes")
          FILE_CHANGES=$(git diff --stat "$PREV_TAG"..HEAD | head -n -1 | head -30 || echo "")
          CODE_DIFF=$(git diff "$PREV_TAG"..HEAD -- 'src/*.ts' | head -c 5000 || echo "Diff too large or no code changes")

          # 读取自定义 prompt 模板（如果存在）
          SYSTEM_PROMPT="你是一个专业的开发者助手，请根据以下 git commit 记录，生成简洁美观的中文 Release Note。要求：1) 使用 Markdown 格式 2) 按功能分类（如新功能、修复、优化等）3) 语言简洁 4) 版本号为 ${CURRENT_TAG}"

          if [ -f ".github/prompt/release_note_prompt.txt" ]; then
            SYSTEM_PROMPT=$(cat .github/prompt/release_note_prompt.txt)
          fi

          USER_CONTENT="当前版本: $CURRENT_TAG
          上一版本: $PREV_TAG
          日期: $(date +'%Y-%m-%d')

          ## 提交列表
          $COMMITS

          ## 文件变化统计
          $SUMMARY_LINE

          ## 变更文件列表
          $FILE_CHANGES

          ## 关键代码变化预览
          \`\`\`diff
          $CODE_DIFF
          \`\`\`"

          # 构造请求 JSON
          PAYLOAD=$(jq -n \
            --arg model "$MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_CONTENT" \
            '{
              model: $model,
              messages: [
                { role: "system", content: $system },
                { role: "user", content: $user }
              ],
              temperature: 0.2,
              max_tokens: 1500
            }')

          # 调用 API
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 60 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AI_API_KEY" \
            -d "$PAYLOAD" \
            "$AI_API_URL")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            # 提取 AI 返回内容
            AI_CONTENT=$(echo "$BODY" | jq -r '.choices[0].message.content // empty')
            if [ -n "$AI_CONTENT" ]; then
              echo -e "$AI_CONTENT" > CHANGELOG.md
              # 替换占位符
              sed -i "s/{VERSION}/$CURRENT_TAG/g" CHANGELOG.md
              sed -i "s/{PREV_VERSION}/$PREV_TAG/g" CHANGELOG.md
              echo "ai_success=true" >> $GITHUB_OUTPUT
              echo "✅ AI Release Note 生成成功"
            else
              echo "⚠️ AI 返回内容为空，将使用默认 Release Note"
              echo "ai_success=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ AI API 请求失败 (HTTP $HTTP_CODE)，将使用默认 Release Note"
            echo "Response: $BODY"
            echo "ai_success=false" >> $GITHUB_OUTPUT
          fi

      - name: Fallback Release Note
        if: steps.ai_release.outputs.ai_success != 'true'
        run: |
          CURRENT_TAG="${{ steps.gitlog.outputs.current_tag }}"
          COMMITS=$(cat commits.txt)

          if [ -f ".github/prompt/default.md" ]; then
            sed "s/{VERSION}/$CURRENT_TAG/g" .github/prompt/default.md > CHANGELOG.md
          else
            echo "## $CURRENT_TAG" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "### 更新内容" >> CHANGELOG.md
            echo "$COMMITS" >> CHANGELOG.md
          fi
          echo "📝 使用默认 Release Note"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          files: |
            napcat-plugin-update-checker.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 触发索引更新工作流
      # 注意：默认 GITHUB_TOKEN 创建的 Release 不会触发 on.release 事件
      # 因此需要手动通过 workflow_dispatch 触发 update-index.yml
      - name: Trigger index update
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-index.yml',
              ref: 'main',
              inputs: {
                version: '${{ steps.version.outputs.version }}'
              }
            })
            console.log('✅ 已触发 update-index.yml 工作流')
